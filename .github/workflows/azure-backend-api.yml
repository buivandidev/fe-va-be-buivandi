name: Azure Backend API

on:
  push:
    branches: [main]
    paths:
      - 'backend/phuongxa-api/**'
      - '.github/workflows/azure-backend-api.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/phuongxa-api/src/PhuongXa.API
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Publish
        run: dotnet publish --configuration Release --output ./publish --no-build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-publish
          path: backend/phuongxa-api/src/PhuongXa.API/publish

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-api-publish
          path: publish
      - name: Deploy to Azure Web App (Backend API)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: publish
