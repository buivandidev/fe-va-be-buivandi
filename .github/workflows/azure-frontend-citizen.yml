name: Azure Frontend Citizen

on:
  push:
    branches: [main]
    paths:
      - 'frontend/nguoi-dan/**'
      - '.github/workflows/azure-frontend-citizen.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/nguoi-dan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.CITIZEN_FE_NEXT_PUBLIC_API_BASE_URL }}
          API_BASE_URL: ${{ secrets.CITIZEN_FE_NEXT_PUBLIC_API_BASE_URL }}
      - name: Prepare standalone assets
        run: |
          # 1. Workspace for total flattening
          mkdir -p $GITHUB_WORKSPACE/final-citizen
          
          # 2. Copy standalone core (dereferencing symlinks)
          cp -rL .next/standalone/. $GITHUB_WORKSPACE/final-citizen/
          
          cd $GITHUB_WORKSPACE/final-citizen
          
          # 3. IF nested monorepo structure exists, MOVE everything to root
          if [ -d "frontend/nguoi-dan" ]; then
            echo "Total flattening of monorepo structure..."
            cp -rL frontend/nguoi-dan/. .
            rm -rf frontend
          fi
          
          # 4. Ensure .next/static and public are AT THE ROOT
          mkdir -p .next/static
          cp -rL $GITHUB_WORKSPACE/frontend/nguoi-dan/.next/static/. .next/static/ || true
          cp -rL $GITHUB_WORKSPACE/frontend/nguoi-dan/public/. ./public/ || true
          
          # 5. Create a duplicate '_next' folder for Azure's underscores requirements
          cp -r .next _next || true
          
          # 6. Verify and ZIP
          ls -la .
          zip -r $GITHUB_WORKSPACE/deploy-citizen.zip .
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: citizen-standalone-bundle
          path: deploy-citizen.zip

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: citizen-standalone-bundle
          path: .
      - name: Deploy to Azure Web App (Citizen FE)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_CITIZEN_FE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_CITIZEN_FE_PUBLISH_PROFILE }}
          package: deploy-citizen.zip
