name: Azure Frontend Citizen

on:
  push:
    branches: [main]
    paths:
      - 'frontend/nguoi-dan/**'
      - '.github/workflows/azure-frontend-citizen.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/nguoi-dan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.CITIZEN_FE_NEXT_PUBLIC_API_BASE_URL }}
          API_BASE_URL: ${{ secrets.CITIZEN_FE_NEXT_PUBLIC_API_BASE_URL }}
      - name: Prepare standalone assets
        run: |
          # Copy static and public into the standalone folder
          cp -r public .next/standalone/frontend/nguoi-dan/ || true
          mkdir -p .next/standalone/frontend/nguoi-dan/.next
          cp -r .next/static .next/standalone/frontend/nguoi-dan/.next/static || true
          
          # CREATE A COMPLETELY FLAT ZIP FROM THE NESTED STANDALONE DIR
          # This is the most reliable way for Next.js monorepos
          cd .next/standalone/frontend/nguoi-dan
          zip -r $GITHUB_WORKSPACE/deploy-citizen.zip .
          
          # Also include node_modules from the parent standalone dir
          cd ..
          cd ..
          zip -g $GITHUB_WORKSPACE/deploy-citizen.zip node_modules server.js .next
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: citizen-standalone-bundle
          path: deploy-citizen.zip

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: citizen-standalone-bundle
          path: .
      - name: Deploy to Azure Web App (Citizen FE)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_CITIZEN_FE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_CITIZEN_FE_PUBLISH_PROFILE }}
          package: deploy-citizen.zip
