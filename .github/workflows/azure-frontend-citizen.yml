name: Azure Frontend Citizen

on:
  push:
    branches: [main]
    paths:
      - 'frontend/nguoi-dan/**'
      - '.github/workflows/azure-frontend-citizen.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/nguoi-dan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.CITIZEN_FE_NEXT_PUBLIC_API_BASE_URL }}
          API_BASE_URL: ${{ secrets.CITIZEN_FE_NEXT_PUBLIC_API_BASE_URL }}
      - name: Prepare standalone assets
        run: |
          # 1. Create a workspace to resolve symlinks
          mkdir -p $GITHUB_WORKSPACE/prep-citizen
          
          # 2. Use -L (dereference) to copy real files instead of symlinks!
          # This is CRITICAL for monorepo standalone folders on Azure.
          cp -rL .next/standalone/. $GITHUB_WORKSPACE/prep-citizen/
          
          # 3. Add static and public assets (using -L to be safe)
          mkdir -p $GITHUB_WORKSPACE/prep-citizen/frontend/nguoi-dan/public
          cp -rL public/. $GITHUB_WORKSPACE/prep-citizen/frontend/nguoi-dan/public/ || true
          
          mkdir -p $GITHUB_WORKSPACE/prep-citizen/frontend/nguoi-dan/.next/static
          cp -rL .next/static/. $GITHUB_WORKSPACE/prep-citizen/frontend/nguoi-dan/.next/static/ || true
          
          # 4. Zip from the resolved directory
          cd $GITHUB_WORKSPACE/prep-citizen
          zip -r $GITHUB_WORKSPACE/deploy-citizen.zip .
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: citizen-standalone-bundle
          path: deploy-citizen.zip

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: citizen-standalone-bundle
          path: .
      - name: Deploy to Azure Web App (Citizen FE)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_CITIZEN_FE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_CITIZEN_FE_PUBLISH_PROFILE }}
          package: deploy-citizen.zip
