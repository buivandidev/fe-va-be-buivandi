name: Azure Frontend Citizen

on:
  push:
    branches: [main]
    paths:
      - 'frontend/nguoi-dan/**'
      - '.github/workflows/azure-frontend-citizen.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/nguoi-dan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.CITIZEN_FE_NEXT_PUBLIC_API_BASE_URL }}
          API_BASE_URL: ${{ secrets.CITIZEN_FE_NEXT_PUBLIC_API_BASE_URL }}
      - name: Prepare standalone assets
        run: |
          # Go to the nested standalone app directory
          cd .next/standalone
          
          # 1. Bring everything from nested app folder to standalone root
          if [ -d "frontend/nguoi-dan" ]; then
            echo "Flattening nested app folder..."
            cp -rv frontend/nguoi-dan/. .
            rm -rf frontend
          fi
          
          # 2. Copy static assets to the root .next folder
          mkdir -p .next/static
          cp -rv ../static/. .next/static/ || true
          
          # 3. Copy public assets to the root public folder
          mkdir -p public
          cp -rv ../../public/. ./public/ || true
          
          # 4. Verify critical files exist at the root
          ls -la .
          ls -la .next
          
          # 5. Create the final ZIP from the now-perfectly-flat standalone root
          zip -r $GITHUB_WORKSPACE/deploy-citizen.zip .
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: citizen-standalone-bundle
          path: deploy-citizen.zip

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: citizen-standalone-bundle
          path: .
      - name: Deploy to Azure Web App (Citizen FE)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_CITIZEN_FE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_CITIZEN_FE_PUBLISH_PROFILE }}
          package: deploy-citizen.zip
