name: Azure Frontend Citizen

on:
  push:
    branches: [main]
    paths:
      - 'frontend/nguoi-dan/**'
      - '.github/workflows/azure-frontend-citizen.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/nguoi-dan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/nguoi-dan/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.CITIZEN_FE_NEXT_PUBLIC_API_BASE_URL }}
          API_BASE_URL: ${{ secrets.CITIZEN_FE_NEXT_PUBLIC_API_BASE_URL }}
      - name: Prepare standalone assets
        run: |
          # Next.js standalone folder often contains a nested path for monorepos
          cd .next/standalone
          
          # Forcefully move all nested files from 'frontend/nguoi-dan' to the root of standalone
          if [ -d "frontend/nguoi-dan" ]; then
            echo "Flattening nested directory..."
            cp -r frontend/nguoi-dan/. .
            rm -rf frontend
          fi
          
          # Manually copy public and static to ensure they are at the correct root
          cp -r ../../public . || true
          mkdir -p .next/static
          cp -r ../static/. .next/static/ || true
          
          # Create ZIP of the root of standalone
          zip -r $GITHUB_WORKSPACE/deploy-citizen.zip .
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: citizen-standalone-bundle
          path: deploy-citizen.zip

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: citizen-standalone-bundle
          path: .
      - name: Deploy to Azure Web App (Citizen FE)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_CITIZEN_FE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_CITIZEN_FE_PUBLISH_PROFILE }}
          package: deploy-citizen.zip
