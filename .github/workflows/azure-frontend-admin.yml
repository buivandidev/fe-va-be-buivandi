name: Azure Frontend Admin

on:
  push:
    branches: [main]
    paths:
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/next.config.mjs'
      - 'frontend/src/**'
      - 'frontend/public/**'
      - '.github/workflows/azure-frontend-admin.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.ADMIN_FE_NEXT_PUBLIC_API_BASE_URL }}
          API_BASE_URL: ${{ secrets.ADMIN_FE_NEXT_PUBLIC_API_BASE_URL }}
      - name: Prepare standalone assets
        run: |
          node scripts/prepare-standalone.mjs
          
          # Create ZIP from standalone root
          cd .next/standalone
          
          # If it's a monorepo, everything is in 'frontend'
          if [ -d "frontend" ]; then
            cd frontend
            zip -r $GITHUB_WORKSPACE/deploy-admin.zip .
            cd ..
            zip -g $GITHUB_WORKSPACE/deploy-admin.zip node_modules server.js .next
          else
            zip -r $GITHUB_WORKSPACE/deploy-admin.zip .
          fi
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-standalone-bundle
          path: deploy-admin.zip

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-standalone-bundle
          path: .
      - name: Deploy to Azure Web App (Admin FE)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_ADMIN_FE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_ADMIN_FE_PUBLISH_PROFILE }}
          package: deploy-admin.zip
