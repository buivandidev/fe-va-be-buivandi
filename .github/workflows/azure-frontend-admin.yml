name: Azure Frontend Admin

on:
  push:
    branches: [main]
    paths:
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/next.config.mjs'
      - 'frontend/src/**'
      - 'frontend/public/**'
      - '.github/workflows/azure-frontend-admin.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.ADMIN_FE_NEXT_PUBLIC_API_BASE_URL }}
          API_BASE_URL: ${{ secrets.ADMIN_FE_NEXT_PUBLIC_API_BASE_URL }}
      - name: Prepare standalone assets
        run: node scripts/prepare-standalone.mjs
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-standalone-bundle
          path: frontend/.next/standalone

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-standalone-bundle
          path: admin-deploy-package
      - name: Deploy to Azure Web App (Admin FE)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_ADMIN_FE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_ADMIN_FE_PUBLISH_PROFILE }}
          package: admin-deploy-package
